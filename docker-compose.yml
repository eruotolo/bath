networks:
    my-bathnet:
        driver: bridge

services:
    mysql:
        image: mariadb:11.2
        container_name: mariadb-${SITE_NAME}
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MARIADB_DATABASE: ${USER_DB_NAME}
            MYSQL_USER: ${USER_DB_USER}
            MYSQL_PASSWORD: ${USER_DB_PASSWORD}
        volumes:
            - ./mysql/mysql-data:/var/lib/mysql
            - ./mysql/database/donbano.sql:/docker-entrypoint-initdb.d/dump_file.sql
        networks:
            - my-bathnet

    phpmyadmin:
        image: phpmyadmin:5.2.1
        container_name: myadmin-${SITE_NAME}
        restart: unless-stopped
        environment:
            PMA_HOST: ${MYSQL_DB_HOST}
            PMA_ARBITRARY: 1
        depends_on:
            - mysql
        networks:
            - my-bathnet

    php:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: php-${SITE_NAME}
        restart: unless-stopped
        volumes:
            - ./app/public:/var/www/html/
            - ./php/php.ini:/usr/local/etc/php/php.ini:ro
            - ./composer.json:/var/www/composer.json
            - ./app/src:/var/www/src
            - ./vendor:/var/www/vendor
        healthcheck:
            test: ["CMD-SHELL", "pidof php-fpm || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 15s
        networks:
            - my-bathnet

    nginx:
        image: nginx:1.25.3-alpine
        container_name: nginx-${SITE_NAME}
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./app/public:/var/www/html/
        depends_on:
            php:
                condition: service_healthy
        networks:
            - my-bathnet
